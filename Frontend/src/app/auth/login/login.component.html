<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <div class="logo">
        <span class="logo-icon">⚖️</span>
        <span class="logo-text">QuantityApp</span>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <!-- Error Banner -->
    <div class="error-banner" *ngIf="errorMsg">
      <span class="error-icon">⚠️</span>
      {{ errorMsg }}
    </div>

    <!-- Google Sign-In Button (rendered by Google SDK) -->
    <div class="google-btn-wrapper">
      <div #googleBtn id="google-sign-in-btn"></div>
      <div class="google-loading" *ngIf="googleLoading">
        <div class="spinner small"></div>
        <span>Signing in with Google...</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <span>or sign in with email</span>
    </div>

    <!-- Login Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            [class.invalid]="email.invalid && email.touched"
          />
        </div>
        <span class="field-error" *ngIf="email.invalid && email.touched">
          <ng-container *ngIf="email.errors?.['required']">Email is required.</ng-container>
          <ng-container *ngIf="email.errors?.['email']">Enter a valid email.</ng-container>
        </span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">
          Password
          <a routerLink="/auth/register" class="forgot-link">Forgot password?</a>
        </label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            [class.invalid]="password.invalid && password.touched"
          />
          <button type="button" class="toggle-password" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="field-error" *ngIf="password.invalid && password.touched">
          <ng-container *ngIf="password.errors?.['required']">Password is required.</ng-container>
          <ng-container *ngIf="password.errors?.['minlength']">At least 6 characters required.</ng-container>
        </span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary" [disabled]="loading">
        <div class="spinner" *ngIf="loading"></div>
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in...</span>
      </button>

    </form>

    <!-- Footer -->
    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/auth/register">Create one</a>
    </p>

  </div>
</div>
